<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BTC Thermal Dashboard</title>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin:0;
      background:#0b0f14;
      color:white;
      font-family:sans-serif;
    }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">

// URL du fichier généré par ton pipeline GitHub
const DATA_URL = "https://raw.githubusercontent.com/kizoka0x/btc-thermal/main/btc_dashboard.json";

// Valeurs par défaut (si GitHub ne répond pas)
const DEFAULT = {
  btcPrice: 0,
  mayerMultiple: 0,
  mvrvPct: 0,
  bullBear30d: 0,
  bullBear365d: 0,
  sharpeShort: 0
};

function App() {
  const [data, setData] = React.useState(DEFAULT);
  const [status, setStatus] = React.useState("Chargement...");

  React.useEffect(() => {
    fetch(DATA_URL + "?t=" + Date.now())
      .then(r => r.json())
      .then(d => {
        setData(d);
        setStatus("Données live chargées");
        console.log("Live:", d);
      })
      .catch(e => {
        setStatus("Erreur chargement");
        console.error(e);
      });
  }, []);

  return (
    <div style={{padding:20}}>
      <h1>BTC Thermal Dashboard</h1>
      <p>Status: {status}</p>

      <h2>Prix BTC: ${data.btcPrice}</h2>
      <p>Mayer: {data.mayerMultiple}</p>
      <p>MVRV %: {data.mvrvPct}</p>
      <p>BullBear 30d: {data.bullBear30d}</p>
      <p>BullBear 365d: {data.bullBear365d}</p>
      <p>Sharpe: {data.sharpeShort}</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
